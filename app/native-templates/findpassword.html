<!DOCTYPE html>
<html class="{night-class}">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="copyright" content="FT中文网">
<meta name="robots" content="noindex,nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>找回密码 - FT中文网</title>
<!--night-style-native-app-->
<style>
body,html {
  min-height: 100%;
}
body {
  margin: 0;
  padding: 0;
  background-color: #fff1e0;
  color: #33302e;
  font-family: Helvetica Neue, Arial, Hiragino Sans GB, WenQuanYi Micro Hei, Heiti SC, Microsoft Yahei, sans-serif;
  font-size: 16px;
}
.o-grid-container {
  box-sizing: border-box;
  margin: 0 auto;
  min-width: 240px;
  max-width: 760px;
  padding: 18px 16px 40px;
}
.auth-card {
  max-width: 520px;
  margin: 0 auto;
}
h1 {
  margin: 0 0 22px;
  padding: 0 0 10px;
  border-bottom: 7px solid #e9decf;
  font-size: 24px;
  line-height: 1.25;
}
.step {
  display: none;
}
.step.is-active {
  display: block;
}
.field {
  margin: 0 0 18px;
}
label {
  display: block;
  margin: 0 0 6px;
  font-size: 17px;
  font-weight: 600;
}
.hint {
  margin: 6px 0 0;
  color: #6b625c;
  font-size: 14px;
  line-height: 1.45;
}
input {
  box-sizing: border-box;
  width: 100%;
  min-height: 42px;
  padding: 9px 8px;
  border: 1px solid #cec6b9;
  border-radius: 3px;
  background-color: #fff;
  color: #33302e;
  font-size: 16px;
  outline: 0;
}
input:focus {
  border-color: #27757b;
  box-shadow: inset 0 0 4px rgba(39, 117, 123, .32);
}
.button {
  display: block;
  box-sizing: border-box;
  min-width: 220px;
  max-width: 100%;
  min-height: 42px;
  margin: 24px auto 0;
  padding: 9px 20px 10px;
  border: 0;
  border-radius: 3px;
  background-color: #26747a;
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  text-align: center;
}
.button:disabled {
  background-color: #e9decf;
  color: #777;
}
.secondary-button {
  margin-top: 14px;
  border: 1px solid #26747a;
  background-color: transparent;
  color: #26747a;
}
.status {
  min-height: 22px;
  margin-top: 18px;
  padding: 12px;
  border-radius: 3px;
  background-color: #f7e9d9;
  color: #33302e;
  font-size: 15px;
  line-height: 1.45;
  word-break: break-word;
}
.status:empty {
  display: none;
}
.status.is-error {
  background-color: #d0021b;
  color: #fff;
}
.done-message {
  margin-top: 12px;
  font-size: 16px;
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="o-grid-container">
  <div class="auth-card">
    <h1>找回密码</h1>

    <form id="emailStep" class="step is-active">
      <div class="field">
        <label for="email">注册邮箱</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="请输入注册时使用的电子邮箱" required>
        <p class="hint">我们会向该邮箱发送 6 位验证码。</p>
      </div>
      <button id="emailSubmit" class="button" type="submit">发送验证码</button>
    </form>

    <form id="resetStep" class="step">
      <div class="field">
        <label for="code">邮箱验证码</label>
        <input id="code" name="code" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="请输入 6 位验证码" required>
      </div>
      <div class="field">
        <label for="password">新密码</label>
        <input id="password" name="password" type="password" autocomplete="new-password" placeholder="请设置新密码" required>
        <p class="hint">至少 8 位，包含大写字母、小写字母、数字和特殊字符。</p>
      </div>
      <button id="resetSubmit" class="button" type="submit">重置密码</button>
      <button id="backToEmail" class="button secondary-button" type="button">更换邮箱</button>
    </form>

    <div id="doneStep" class="step">
      <p class="done-message">密码已重置。您可以返回之前的页面继续使用 FT中文网。</p>
      <button id="closeButton" class="button" type="button">完成</button>
    </div>

    <div id="status" class="status"></div>
  </div>
</div>

<script>
(function () {
  var resetToken = '';
  var emailValue = '';
  var statusEle = document.getElementById('status');
  var emailStep = document.getElementById('emailStep');
  var resetStep = document.getElementById('resetStep');
  var doneStep = document.getElementById('doneStep');
  var emailSubmit = document.getElementById('emailSubmit');
  var resetSubmit = document.getElementById('resetSubmit');

  function getDeviceType() {
    var ua = navigator.userAgent || navigator.vendor || '';
    if (/iphone|android/gi.test(ua)) {
      return 'mobile';
    }
    if (/ipad/gi.test(ua) || (/AppleWebKit/.test(ua) && !/Safari|Chrome/.test(ua))) {
      return 'tablet';
    }
    return 'desktop';
  }

  function setStatus(message, isError) {
    statusEle.textContent = message || '';
    statusEle.className = isError ? 'status is-error' : 'status';
  }

  function setBusy(button, busy, label) {
    button.disabled = busy;
    if (label) {
      button.textContent = label;
    }
  }

  function showStep(step) {
    emailStep.classList.remove('is-active');
    resetStep.classList.remove('is-active');
    doneStep.classList.remove('is-active');
    step.classList.add('is-active');
  }

  function parseJSON(text) {
    try {
      return JSON.parse(text || '{}');
    } catch (ignore) {
      return {};
    }
  }

  function postJSON(url, payload, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', url, true);
    xhr.withCredentials = true;
    xhr.setRequestHeader('Accept', 'application/json');
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onreadystatechange = function () {
      if (xhr.readyState !== 4) {
        return;
      }
      callback(xhr.status, parseJSON(xhr.responseText));
    };
    xhr.onerror = function () {
      callback(0, {message: '网络连接失败，请稍后再试。'});
    };
    xhr.send(JSON.stringify(payload));
  }

  function getErrorMessage(json, fallback) {
    if (json && json.message) {
      return json.message;
    }
    if (json && json.errors && json.errors.length > 0) {
      return json.errors.map(function (item) {
        return item.msg || item.message || '';
      }).filter(Boolean).join('\n');
    }
    return fallback;
  }

  function notifyNativeTokensChanged() {
    var payload = {source: 'findpassword'};
    try {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.authTokensMayHaveChanged) {
        window.webkit.messageHandlers.authTokensMayHaveChanged.postMessage(payload);
      }
    } catch (ignore) {}
  }

  emailStep.addEventListener('submit', function (event) {
    event.preventDefault();
    emailValue = document.getElementById('email').value.trim().toLowerCase();
    if (!emailValue || !/.+@.+\..+/.test(emailValue)) {
      setStatus('请输入有效的邮箱地址。', true);
      return;
    }
    setStatus('正在发送验证码，请稍候...', false);
    setBusy(emailSubmit, true, '发送中...');
    postJSON('/resetpassword', {
      email: emailValue,
      deviceType: getDeviceType()
    }, function (status, json) {
      setBusy(emailSubmit, false, '发送验证码');
      if (status !== 200 || !json || json.status === 'error' || !json.token) {
        setStatus(getErrorMessage(json, '验证码发送失败，请稍后再试。'), true);
        return;
      }
      resetToken = json.token;
      showStep(resetStep);
      setStatus(json.message || '验证码已发送，请检查您的邮箱。', false);
      document.getElementById('code').focus();
    });
  });

  resetStep.addEventListener('submit', function (event) {
    event.preventDefault();
    var code = document.getElementById('code').value.trim();
    var password = document.getElementById('password').value;
    if (!/^[0-9]{6}$/.test(code)) {
      setStatus('请输入 6 位邮箱验证码。', true);
      return;
    }
    if (!/^.{8,}$/.test(password) || !/[a-z]/.test(password) || !/[A-Z]/.test(password) || !/[0-9]/.test(password) || !/[\W_]/.test(password)) {
      setStatus('新密码至少 8 位，并且需要包含大写字母、小写字母、数字和特殊字符。', true);
      return;
    }
    setStatus('正在重置密码，请稍候...', false);
    setBusy(resetSubmit, true, '重置中...');
    postJSON('/verifyemailtoresetpassword', {
      token: resetToken,
      code: code,
      password: password,
      deviceType: getDeviceType()
    }, function (status, json) {
      setBusy(resetSubmit, false, '重置密码');
      if (status !== 200 || !json || !/^(ok|success)$/i.test(json.status || '')) {
        setStatus(getErrorMessage(json, '密码重置失败，请检查验证码后重试。'), true);
        return;
      }
      notifyNativeTokensChanged();
      showStep(doneStep);
      setStatus(json.message || '密码重置成功。', false);
    });
  });

  document.getElementById('backToEmail').addEventListener('click', function () {
    resetToken = '';
    showStep(emailStep);
    setStatus('', false);
    document.getElementById('email').focus();
  });

  document.getElementById('closeButton').addEventListener('click', function () {
    setStatus('', false);
    try {
      history.back();
    } catch (ignore) {}
  });

  document.getElementById('email').focus();
}());
</script>
</body>
</html>
